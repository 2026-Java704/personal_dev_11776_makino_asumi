<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>新規会員登録</title>
</head>
<body>
	<h1>新規会員登録</h1>
	
	<div th:if="${errorList}" style="color: red;">
			
				<li th:each="error : ${errorList}" th:text="${error}"></li>
			
	</div>
	
	<form th:action="@{/users/add}" method="post">
		
	<input type="text"name="email" 	 placeholder="メールアドレス"><br>
	<input type="text"name="password"  placeholder="パスワード"><br>
	<input type="text"name="passwordConfirm" placeholder="パスワード(確認)"><br>
	
	<button>新規作成</button>
	</form>


</body>
</html>
