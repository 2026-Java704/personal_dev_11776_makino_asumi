<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>レシピ作成画面</title>
</head>
<body>
	<h2>レシピ作成画面</h2>
	
	<form th:action="@{/recipes}" method="post">
		
		<select id="category" name="categoryId" required>
			<option value="">カテゴリーを選択してください</option>
		<option th:each="catName, status : ${categoryNames}" 
						        th:value="${status.count}" 
						        th:text="${catName}">
		</option>
		</select>

	
		
		<p>料理名<br>
			<textarea name="name"cols="30" rows="3" ></textarea>
		</p>
		<p>作り方<br>
			<textarea name="recipe"cols="30" rows="10" ></textarea>
		</p>
		
		
		<input type="submit" value="投稿">
	</form>

</body>
</html>
