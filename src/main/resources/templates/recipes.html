<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>レシピ一覧</title>
</head>
<body>
	
	<h1>レシピ投稿サイト</h1> 
	
	  <input type="text" name="recipe"> <button>検索</button>  <button>投稿</button><br>
	  
	  <span>カテゴリー：</span>
	  
	  <a th:href="@{/recipes}">全レシピ</a>
	
	  <span th:each="catName, status : ${categoryNames}" >
	      <a th:href="@{/recipes(categoryId=${status.count})}" th:text="${catName}">カテゴリー名</a>
	  </span>
		
		<p>
		レシピ一覧<br>
		<tr th:each="recipe : ${recipes}"><br>
			<td th:text="${recipe.name}">料理名</td>						
		</tr>
		</p>
		
</body>
</html>
